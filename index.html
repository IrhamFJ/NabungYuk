<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NabungYUK!</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #f8cc3d; 
            --gold-glow: rgba(248, 204, 61, 0.3);
            --bg-dark: #0a0a0a;
            --panel: rgba(30, 30, 28, 0.85);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --red: #ff5f5f;
            --green: #4ade80;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            height: 100dvh; width: 100%; background: var(--bg-dark);
            color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex; justify-content: center; align-items: center; overflow: hidden; 
        }

        body::before {
            content: ''; position: absolute; top: -10%; left: -10%; width: 50%; height: 50%;
            background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
            filter: blur(100px); z-index: 1; opacity: 0.4;
        }

        .scene { 
            display: none; width: 100%; height: 100%; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 10; padding: 20px; 
            opacity: 0; transform: scale(0.98); transition: var(--transition);
        }
        .active { display: flex; opacity: 1; transform: scale(1); }

        .card { 
            width: 100%; max-width: 400px; background: var(--panel); padding: 40px 25px; 
            border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(30px); text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            position: relative; 
        }

        .logo-text { font-weight: 800; font-size: 36px; letter-spacing: -1px; margin-bottom: 5px; }
        .logo-text span { color: var(--gold); text-shadow: 0 0 20px var(--gold-glow); }

        .circle-box { position: relative; width: 220px; height: 220px; margin: 20px auto; display: flex; justify-content: center; align-items: center; }
        svg.prog-svg { width: 100%; height: 100%; transform: rotate(-90deg); overflow: visible; }
        .circle-bg { fill: none; stroke: rgba(255, 255, 255, 0.03); stroke-width: 15; }
        .circle-prog { 
            fill: none; stroke: var(--gold); stroke-width: 15; stroke-linecap: round; 
            stroke-dasharray: 565.48; stroke-dashoffset: 565.48; transition: stroke-dashoffset 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .percent-display { position: absolute; text-align: center; }
        .percent-num { font-size: 50px; font-weight: 800; color: #fff; line-height: 1; }
        .percent-num small { font-size: 20px; opacity: 0.5; vertical-align: super; }

        .data-panel { margin: 20px 0; background: rgba(0,0,0,0.25); padding: 18px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.03); }
        .target-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 5px; }
        .saved-val { font-size: 32px; font-weight: 800; color: #fff; letter-spacing: -1px; }
        .last-val { font-size: 13px; font-weight: 600; margin-top: 6px; display: flex; align-items: center; justify-content: center; gap: 6px; }

        .input-box {
            position: relative; display: flex; align-items: center; margin-bottom: 12px;
            background: rgba(0,0,0,0.4); border-radius: 18px; border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }
        .input-box:focus-within { border-color: var(--gold); background: rgba(248, 204, 61, 0.05); }
        .input-box i { padding: 0 15px; color: var(--gold); font-size: 18px; }
        input[type="number"] { width: 100%; padding: 16px 16px 16px 0; background: none; border: none; color: #fff; font-size: 16px; font-weight: 600; font-family: inherit; outline: none; }

        .btn {
            padding: 16px; border-radius: 16px; border: none; font-weight: 800; 
            font-size: 14px; cursor: pointer; text-transform: uppercase; letter-spacing: 1.5px;
            transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-gold { background: var(--gold); color: #000; box-shadow: 0 8px 20px -5px rgba(248, 204, 61, 0.4); }
        .btn-gold:active { transform: scale(0.96); }
        .btn-red { background: rgba(255, 95, 95, 0.1); color: var(--red); border: 1px solid rgba(255, 95, 95, 0.2); }

        .img-target { width: 85px; height: 85px; border-radius: 50%; object-fit: cover; border: 3px solid var(--gold); margin: 0 auto 12px; display: none; box-shadow: 0 0 15px var(--gold-glow); }

        #celeOverlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 1000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(15px); opacity: 0; transition: 0.6s;
        }
        #celeOverlay.active { display: flex; opacity: 1; }

        .btn-reset { margin-top: 25px; background: none; border: none; color: var(--text-dim); font-size: 10px; text-decoration: underline; cursor: pointer; opacity: 0.4; }
    </style>
</head>
<body>

    <div id="celeOverlay">
        <i class="fas fa-crown" style="font-size: 70px; color: var(--gold); margin-bottom: 20px; filter: drop-shadow(0 0 20px var(--gold));"></i>
        <h2 style="font-size: 28px; text-align: center;">TARGET <span style="color:var(--gold)">TERCAPAI!</span></h2>
        <p style="color: var(--green); margin-top: 10px; font-weight: 600; text-align: center; padding: 0 20px;">Hebat Jih, barang impianmu sudah didepan mata!</p>
    </div>

    <div id="scene0" class="scene active">
        <div class="card">
            <h1 class="logo-text">Nabung<span>YUK!</span></h1>
            <p style="color:var(--text-dim); margin-bottom: 35px; font-size: 14px;">Simpan sekarang, nikmati kemudian.</p>
            <button class="btn btn-gold" onclick="gateCheck()" style="width: 100%;">
                MASUK BRANKAS <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <div id="scene1" class="scene">
        <div class="card">
            <h2 style="margin-bottom: 30px; letter-spacing: -1px;">🎯 Barang <span style="color:var(--gold)">Impian</span></h2>
            <div class="input-box">
                <i class="fas fa-bullseye"></i>
                <input type="number" id="inNominal" placeholder="Nominal Target (Rp)">
            </div>
            <div style="text-align: left; margin-bottom: 25px;">
                <label style="font-size: 10px; color: var(--text-dim); margin-left: 5px; display: block; margin-bottom: 10px;">FOTO BARANG (GALERI / KAMERA)</label>
                <input type="file" id="inFoto" accept="image/*" style="font-size: 11px; color: var(--gold); width: 100%;">
            </div>
            <button class="btn btn-gold" onclick="initApp()" style="width: 100%;">MULAI NABUNG</button>
        </div>
    </div>

    <div id="scene2" class="scene">
        <div class="card">
            <img id="displayImg" class="img-target">
            
            <div class="data-panel">
                <p class="target-label" id="txtTarget">Target: Rp 0</p>
                <h3 class="saved-val" id="txtSaved">Rp 0</h3>
                <p class="last-val" id="txtLast">Mulai menabung Jih!</p>
            </div>

            <div class="circle-box">
                <svg viewBox="0 0 200 200" class="prog-svg">
                    <circle class="circle-bg" cx="100" cy="100" r="90"></circle>
                    <circle id="progCircle" class="circle-prog" cx="100" cy="100" r="90"></circle>
                </svg>
                <div class="percent-display">
                    <div class="percent-num"><span id="valPersen">0</span><small>%</small></div>
                </div>
            </div>

            <div id="controlPanel">
                <div class="input-box">
                    <i class="fas fa-wallet"></i>
                    <input type="number" id="addVal" placeholder="Nominal Rp...">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <button class="btn btn-gold" onclick="addMoney()">SETOR</button>
                    <button class="btn btn-red" onclick="withdrawMoney()">TARIK</button>
                </div>
            </div>

            <div id="finishPanel" style="display: none; margin-top: 15px;">
                <p style="color: var(--green); font-weight: 800; margin-bottom: 15px;">LUNAS JIH! 🚀</p>
                <button class="btn btn-gold" style="width: 100%;" onclick="fullReset()">BUAT TARGET BARU</button>
            </div>

            <button class="btn-reset" onclick="fullReset()">Reset & Hapus Data</button>
        </div>
    </div>

    <script>
        const KEY = 'NABUNGYUK_FINAL_STABLE_V4';
        const LEN = 565.48;
        let store = JSON.parse(localStorage.getItem(KEY)) || { target: 0, saved: 0, last: 0, img: '', done: false };

        function gateCheck() {
            store.target > 0 ? (render(), move('scene2')) : move('scene1');
        }

        function initApp() {
            const val = document.getElementById('inNominal').value;
            const file = document.getElementById('inFoto').files[0];
            if(!val || val <= 0) return alert("Isi target nominal dulu Jih!");
            
            store = { target: Number(val), saved: 0, last: 0, img: '', done: false };
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => { store.img = e.target.result; save(); render(); move('scene2'); };
                reader.readAsDataURL(file);
            } else { save(); render(); move('scene2'); }
        }

        function render() {
            const fmt = new Intl.NumberFormat('id-ID');
            const p = Math.min((store.saved / store.target) * 100, 100);
            
            document.getElementById('valPersen').innerText = Math.floor(p);
            document.getElementById('txtSaved').innerText = "Rp " + fmt.format(store.saved);
            document.getElementById('txtTarget').innerText = "Target: Rp " + fmt.format(store.target);
            
            const l = document.getElementById('txtLast');
            if(store.last === 0) { l.style.color = 'var(--text-dim)'; l.innerHTML = 'Belum ada transaksi'; }
            else if(store.last > 0) { l.style.color = 'var(--green)'; l.innerHTML = `<i class="fas fa-caret-up"></i> +Rp ${fmt.format(store.last)}`; }
            else { l.style.color = 'var(--red)'; l.innerHTML = `<i class="fas fa-caret-down"></i> -Rp ${fmt.format(Math.abs(store.last))}`; }

            document.getElementById('progCircle').style.strokeDashoffset = LEN - (p/100 * LEN);
            
            if(store.img) { const i = document.getElementById('displayImg'); i.src = store.img; i.style.display = 'block'; }
            else { document.getElementById('displayImg').style.display = 'none'; }

            if(p >= 100) {
                document.getElementById('controlPanel').style.display = 'none';
                document.getElementById('finishPanel').style.display = 'block';
                document.getElementById('progCircle').style.stroke = 'var(--green)';
                if(!store.done) { launchCele(); store.done = true; save(); }
            } else {
                document.getElementById('controlPanel').style.display = 'block';
                document.getElementById('finishPanel').style.display = 'none';
                document.getElementById('progCircle').style.stroke = 'var(--gold)';
                store.done = false; save();
            }
        }

        function addMoney() {
            const el = document.getElementById('addVal');
            const v = Number(el.value);
            if(v <= 0) return;
            store.saved += v; store.last = v;
            el.value = ''; el.blur();
            save(); render();
        }

        function withdrawMoney() {
            const el = document.getElementById('addVal');
            const v = Number(el.value);
            if(v <= 0) return;
            if(v > store.saved) return alert("Saldo ga cukup Jih!");
            if(confirm(`Tarik Rp ${new Intl.NumberFormat('id-ID').format(v)}?`)) {
                store.saved -= v; store.last = -v;
                el.value = ''; el.blur();
                save(); render();
            }
        }

        function launchCele() {
            const o = document.getElementById('celeOverlay');
            o.style.display = 'flex';
            setTimeout(() => o.classList.add('active'), 50);
            setTimeout(() => { o.classList.remove('active'); setTimeout(()=>o.style.display='none', 500); }, 3500);
        }

        function save() { localStorage.setItem(KEY, JSON.stringify(store)); }
        function move(id) {
            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
            setTimeout(() => document.getElementById(id).classList.add('active'), 50);
        }
        function fullReset() { 
            if(confirm("Hapus data & mulai target baru?")) { localStorage.removeItem(KEY); location.reload(); } 
        }
    </script>
</body>
</html>
