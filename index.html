<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NabungYUK! - Master Gold Stable</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --amber: #f1c40f; 
            --amber-dim: #b8860b; 
            --bg: #0a0a08;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            height: 100%; width: 100%; background: radial-gradient(circle, #1a1a15 0%, var(--bg) 100%);
            color: #eee; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; overflow: hidden; 
        }

        .scene { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; z-index: 10; padding: 20px; }
        .active { display: flex; }

        /* --- WELCOME: FIX CENTERED TOTAL --- */
        .welcome-wrapper { width: 100%; max-width: 400px; text-align: center; }
        .svg-title { width: 100%; height: 120px; overflow: visible; }
        .text-main { font-size: 52px; font-weight: 900; text-anchor: middle; dominant-baseline: middle; text-transform: uppercase; letter-spacing: 4px; }
        .layer-flow { fill: none; stroke: var(--amber); stroke-width: 2; stroke-dasharray: 200; stroke-dashoffset: 200; animation: flow 4s infinite linear; filter: drop-shadow(0 0 15px var(--amber)); }
        @keyframes flow { to { stroke-dashoffset: 0; } }

        /* --- CARD SYSTEM --- */
        .card { 
            width: 100%; max-width: 420px; background: rgba(20, 20, 18, 0.85); padding: 35px; 
            border-radius: 40px; border: 1px solid rgba(241, 196, 15, 0.2); backdrop-filter: blur(20px); text-align: center;
        }

        .btn-gold { 
            width: 100%; padding: 20px; border: none; border-radius: 18px; 
            background: linear-gradient(135deg, var(--amber), var(--amber-dim)); color: #000; font-weight: 900; 
            font-size: 16px; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-top: 15px;
        }
        .btn-gold:active { transform: scale(0.96); }

        input { width: 100%; padding: 18px; background: rgba(0,0,0,0.6); border: 1px solid rgba(241, 196, 15, 0.2); border-radius: 15px; color: #fff; font-size: 16px; margin-bottom: 12px; outline: none; }

        /* --- DASHBOARD JIH! (SESUAI SKETSA) --- */
        .target-img { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 3px solid var(--amber); margin: 0 auto 15px; display: none; box-shadow: 0 0 20px var(--amber); }
        
        .circle-box { position: relative; width: 280px; height: 280px; margin: 10px auto; display: flex; justify-content: center; align-items: center; overflow: visible !important; }
        svg.prog-svg { width: 100%; height: 100%; overflow: visible !important; transform: rotate(-90deg); }
        .circle-bg { fill: none; stroke: rgba(255,255,255,0.03); stroke-width: 20; }
        .circle-prog { fill: none; stroke: var(--amber); stroke-width: 20; stroke-linecap: round; stroke-dasharray: 565.48; stroke-dashoffset: 565.48; transition: 1.2s ease-out; }
        .glow-active .circle-prog { stroke-width: 26; filter: drop-shadow(0 0 35px var(--amber)) drop-shadow(0 0 10px #fff); }
        
        .percent-display { position: absolute; text-align: center; }
        .percent-num { font-size: 55px; font-weight: 900; color: #fff; }
        .percent-label { font-size: 10px; color: var(--amber-dim); text-transform: uppercase; letter-spacing: 2px; }

        .data-stack { margin-bottom: 25px; }
        .data-saved { font-size: 34px; font-weight: 900; color: #ff6b6b; /* Red-ish like sketch */ text-shadow: 0 0 15px rgba(255, 107, 107, 0.3); }
        .data-last { font-size: 12px; color: #51cf66; /* Green-ish like sketch */ font-weight: 700; }
        .data-target { font-size: 10px; color: #555; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="scene0" class="scene active">
        <div class="welcome-wrapper">
            <div class="svg-title">
                <svg viewBox="0 0 400 120" style="overflow:visible">
                    <text x="50%" y="50%" class="text-main" fill="rgba(255,255,255,0.05)">NabungYUK!</text>
                    <text x="50%" y="50%" class="text-main layer-flow">NabungYUK!</text>
                </svg>
            </div>
            <button class="btn-gold" style="width:200px" onclick="gateCheck()">MASUK</button>
        </div>
    </div>

    <div id="scene1" class="scene">
        <div class="card">
            <h2 style="color:var(--amber); margin-bottom:20px;">TARGET BARU</h2>
            <input type="number" id="inNominal" placeholder="Nominal Target (Rp)">
            <div style="text-align:left; margin-bottom:15px;">
                <label style="font-size:10px; color:#555; margin-left:5px;">FOTO BARANG (KAMERA/FILE):</label>
                <input type="file" id="inFoto" accept="image/*" capture="environment" style="border:none; background:none; font-size:11px; color:var(--amber-dim);">
            </div>
            <button class="btn-gold" onclick="initApp()">MULAI SEKARANG</button>
        </div>
    </div>

    <div id="scene2" class="scene">
        <div class="card">
            <img id="displayImg" class="target-img">
            
            <div class="data-stack">
                <p class="data-target" id="txtTarget">SIMPAN: Rp 0</p>
                <h3 class="data-saved" id="txtSaved">Rp 0</h3>
                <p class="data-last" id="txtLast">+Rp 0 (Terakhir)</p>
            </div>

            <div class="circle-box" id="glowZone">
                <svg viewBox="0 0 200 200" class="prog-svg">
                    <circle class="circle-bg" cx="100" cy="100" r="90"></circle>
                    <circle id="progCircle" class="circle-prog" cx="100" cy="100" r="90"></circle>
                </svg>
                <div class="percent-display">
                    <div class="percent-num"><span id="valPersen">0</span>%</div>
                    <div class="percent-label">Terkumpul</div>
                </div>
            </div>

            <input type="number" id="addVal" placeholder="Setor Saldo (Rp)">
            <button class="btn-gold" onclick="addMoney()">SETOR</button>
            <button onclick="fullReset()" style="background:none; border:none; color:#1a1a1a; margin-top:30px; cursor:pointer; font-size:10px; text-decoration:underline;">HAPUS DATA</button>
        </div>
    </div>

    <script>
        const DB_KEY = 'NabungYuk_ULTRA_GOLD_STABLE';
        let store = JSON.parse(localStorage.getItem(DB_KEY)) || { target: 0, saved: 0, last: 0, img: '' };

        function gateCheck() {
            if(store.target > 0) { renderUI(); switchScene('scene2'); } 
            else { switchScene('scene1'); }
        }

        function initApp() {
            const v = document.getElementById('inNominal').value;
            const f = document.getElementById('inFoto').files[0];
            if(!v || v <= 0) return alert("Target wajib diisi Jih!");
            store.target = Number(v);
            if(f) {
                const reader = new FileReader();
                reader.onload = (e) => { store.img = e.target.result; finishInit(); };
                reader.readAsDataURL(f);
            } else { finishInit(); }
        }

        function finishInit() { localStorage.setItem(DB_KEY, JSON.stringify(store)); renderUI(); switchScene('scene2'); }

        function renderUI() {
            const fmt = new Intl.NumberFormat('id-ID');
            const p = Math.min((store.saved / store.target) * 100, 100);
            
            document.getElementById('valPersen').innerText = Math.floor(p);
            document.getElementById('txtSaved').innerText = "Rp " + fmt.format(store.saved);
            document.getElementById('txtLast').innerText = "+Rp " + fmt.format(store.last) + " (Terakhir)";
            document.getElementById('txtTarget').innerText = "SIMPAN: Rp " + fmt.format(store.target);
            
            // Progress Bar (Keliling = 565.48)
            document.getElementById('progCircle').style.strokeDashoffset = 565.48 - (p/100 * 565.48);
            
            if(store.img) {
                const el = document.getElementById('displayImg');
                el.src = store.img; el.style.display = 'block';
            }
            if(p >= 100) document.getElementById('glowZone').classList.add('glow-active');
        }

        function addMoney() {
            const v = Number(document.getElementById('addVal').value);
            if(v <= 0) return;
            store.saved += v;
            store.last = v;
            localStorage.setItem(DB_KEY, JSON.stringify(store));
            renderUI();
            document.getElementById('addVal').value = '';
        }

        function switchScene(id) {
            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function fullReset() { if(confirm("Data ilang permanen Jih!")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
