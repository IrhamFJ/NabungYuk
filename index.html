<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NabungYUK! - Final Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --green: #2ecc71; --gold: #f1c40f; --pink: #ff00c1; --cyan: #00fff9; --bg: #07070a; }
        * { box-sizing: border-box; }
        body, html { height: 100%; margin: 0; background: var(--bg); color: white; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        .scene { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        .active { display: flex; }

        /* --- WELCOME & GLITCH --- */
        .glitch-wrapper { font-size: clamp(40px, 10vw, 70px); font-weight: 900; position: relative; letter-spacing: 8px; margin-bottom: 40px; }
        .glitch-text::before, .glitch-text::after { content: "NabungYUK!"; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .glitch-text::before { left: 3px; text-shadow: -2px 0 var(--pink); clip: rect(44px, 450px, 56px, 0); animation: g-1 0.6s infinite linear alternate-reverse; }
        .glitch-text::after { left: -3px; text-shadow: 2px 0 var(--cyan); clip: rect(44px, 450px, 56px, 0); animation: g-2 0.6s infinite linear alternate-reverse; }
        @keyframes g-1 { 0% { clip: rect(10px, 9999px, 85px, 0); } 100% { clip: rect(80px, 9999px, 20px, 0); } }
        @keyframes g-2 { 0% { clip: rect(70px, 9999px, 30px, 0); } 100% { clip: rect(15px, 9999px, 90px, 0); } }

        /* --- SHAKE ANIMATION (Hanya pas klik Masuk) --- */
        .shake-agresif { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(0,0) rotate(0); }
            25% { transform: translate(8px, -8px) rotate(2deg); }
            50% { transform: translate(-8px, 8px) rotate(-2deg); }
            75% { transform: translate(8px, 8px) rotate(2deg); }
            100% { transform: translate(-8px, -8px) rotate(-2deg); }
        }

        /* --- CARDS & UI --- */
        .card { width: 100%; max-width: 450px; background: rgba(255,255,255,0.03); padding: 35px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); }
        label { display: block; text-align: left; font-size: 12px; color: #888; margin: 15px 0 5px 5px; text-transform: uppercase; }
        input { width: 100%; padding: 16px; background: #000; border: 2px solid #222; border-radius: 12px; color: white; font-size: 16px; }
        input:focus { border-color: var(--green); outline: none; }
        
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-green { background: var(--green); color: #000; margin-top: 20px; }
        .btn-gold { background: var(--gold); color: #000; margin-top: 20px; }
        .btn:active { transform: scale(0.95); }

        /* --- PROGRESS & GLOW --- */
        .circle-box { position: relative; width: 220px; height: 220px; margin: 20px auto; }
        svg { transform: rotate(-90deg); width: 220px; height: 220px; }
        .circle-bg { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 20; }
        .circle-prog { fill: none; stroke: var(--green); stroke-width: 20; stroke-linecap: round; stroke-dasharray: 565.48; stroke-dashoffset: 565.48; transition: 1s ease-out; }
        
        .glow-100 .circle-prog { 
            stroke: var(--gold); stroke-width: 25;
            filter: drop-shadow(0 0 15px var(--gold)) drop-shadow(0 0 40px var(--gold));
        }
        .percent-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 45px; font-weight: 900; }

        .target-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--green); margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

    <div id="scene0" class="scene active">
        <div id="welcomeContent">
            <div class="glitch-wrapper"><div class="glitch-text">NabungYUK!</div></div>
            <button class="btn btn-green" style="width: auto; padding: 15px 50px;" onclick="startApp()">MASUK</button>
        </div>
    </div>

    <div id="scene1" class="scene">
        <div class="card">
            <h2 style="color: var(--green); margin: 0;">SET TARGET</h2>
            <label>Nominal Target (Rp) *</label>
            <input type="number" id="setNominal" placeholder="Contoh: 5000000">
            <label>Foto Barang (Opsional)</label>
            <input type="file" id="setFoto" accept="image/*">
            <button class="btn btn-green" onclick="saveInitialTarget()">Kunci Target</button>
        </div>
    </div>

    <div id="scene2" class="scene">
        <div class="card" id="dashCard">
            <img id="viewImg" class="target-img">
            <h3 id="viewTitle" style="margin: 0 0 20px 0; letter-spacing: 1px;">MY PROGRESS</h3>
            
            <div class="circle-box" id="glowArea">
                <svg viewBox="0 0 200 200">
                    <circle class="circle-bg" cx="100" cy="100" r="90"></circle>
                    <circle class="circle-prog" id="progBar" cx="100" cy="100" r="90"></circle>
                </svg>
                <div class="percent-text"><span id="txtPersen">0</span>%</div>
            </div>

            <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; margin-bottom: 20px;">
                <span style="font-size: 11px; color: #777;">TERKUMPUL</span>
                <div id="txtTerkumpul" style="font-size: 24px; font-weight: 900; color: var(--green);">Rp 0</div>
                <span style="font-size: 11px; color: #555;">DARI TARGET: <span id="txtTarget">Rp 0</span></span>
            </div>

            <label>Nabung Hari Ini (Rp)</label>
            <input type="number" id="addMoney" placeholder="Masukkan nominal">
            <button class="btn btn-gold" onclick="addSaving()">Isi Celengan</button>
            <button onclick="hardReset()" style="background:none; border:none; color:#444; margin-top:20px; cursor:pointer; font-size:10px; text-decoration: underline;">RESET SEMUA DATA</button>
        </div>
    </div>

    <script>
        // DATA CENTRALIZATION (ANTI-ILANG)
        let appData = JSON.parse(localStorage.getItem('NabungYuk_Data')) || {
            target: 0,
            saved: 0,
            image: ''
        };

        function updateStorage() {
            localStorage.setItem('NabungYuk_Data', JSON.stringify(appData));
        }

        // SCENE CONTROLLER
        function goTo(id) {
            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // STEP 1: WELCOME TO NEXT
        function startApp() {
            const welcome = document.getElementById('welcomeContent');
            welcome.classList.add('shake-agresif'); // SHAKE CEPET JIH!

            setTimeout(() => {
                welcome.classList.remove('shake-agresif');
                if (appData.target > 0) {
                    renderDashboard();
                    goTo('scene2');
                } else {
                    goTo('scene1');
                }
            }, 1200); // Guncang 1.2 detik
        }

        // STEP 2: SAVE SETUP
        function saveInitialTarget() {
            const nom = document.getElementById('setNominal').value;
            const file = document.getElementById('setFoto').files[0];

            if (!nom || nom <= 0) return alert("Target wajib diisi, Jih!");

            appData.target = Number(nom);

            if (file) {
                const reader = new FileReader();
                reader.onloadend = () => {
                    appData.image = reader.result;
                    updateStorage();
                    renderDashboard();
                    goTo('scene2');
                };
                reader.readAsDataURL(file);
            } else {
                updateStorage();
                renderDashboard();
                goTo('scene2');
            }
        }

        // STEP 3: MAIN LOGIC
        function renderDashboard() {
            const f = new Intl.NumberFormat('id-ID');
            const persen = Math.min((appData.saved / appData.target) * 100, 100);

            document.getElementById('txtPersen').innerText = Math.floor(persen);
            document.getElementById('txtTerkumpul').innerText = "Rp " + f.format(appData.saved);
            document.getElementById('txtTarget').innerText = "Rp " + f.format(appData.target);

            // Progress Bar (Keliling 2 * PI * 90 = 565.48)
            const offset = 565.48 - (persen / 100 * 565.48);
            document.getElementById('progBar').style.strokeDashoffset = offset;

            // Foto
            if (appData.image) {
                const img = document.getElementById('viewImg');
                img.src = appData.image;
                img.style.display = 'block';
            }

            // Glow Emas 100%
            if (persen >= 100) {
                document.getElementById('glowArea').classList.add('glow-100');
            } else {
                document.getElementById('glowArea').classList.remove('glow-100');
            }
        }

        function addSaving() {
            const input = document.getElementById('addMoney');
            const val = Number(input.value);

            if (val <= 0) return alert("Duitnya mana? Isi dulu!");

            appData.saved += val;
            updateStorage();
            renderDashboard();
            input.value = "";
            alert("Duit masuk! Lanjutkan, Jih!");
        }

        function hardReset() {
            if (confirm("Data target dan tabungan bakal ilang. Yakin lu?")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
