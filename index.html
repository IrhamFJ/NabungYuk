<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NabungYUK! - Glitch & Pro Mode</title>
    <style>
        :root { --neon-green: #2ecc71; --neon-gold: #f1c40f; --bg-dark: #0a0a12; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-dark); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        /* --- GLOBAL SCENE MANAGEMENT --- */
        .scene { display: none; width: 100%; max-width: 400px; padding: 30px; text-align: center; box-sizing: border-box; animation: fadeIn 0.5s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- SCENE 0: WELCOME GLITCH --- */
        .glitch-wrapper { font-size: 50px; font-weight: 900; position: relative; color: white; letter-spacing: 5px; text-transform: uppercase; }
        .glitch-text::before, .glitch-text::after { content: "NabungYUK!"; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .glitch-text::before { left: 3px; text-shadow: -3px 0 #ff00c1; clip: rect(44px, 450px, 56px, 0); animation: glitch-1 1s infinite linear alternate-reverse; }
        .glitch-text::after { left: -3px; text-shadow: -3px 0 #00fff9; clip: rect(44px, 450px, 56px, 0); animation: glitch-2 1s infinite linear alternate-reverse; }
        @keyframes glitch-1 { 0% { clip: rect(10px, 9999px, 85px, 0); } 100% { clip: rect(80px, 9999px, 20px, 0); } }
        @keyframes glitch-2 { 0% { clip: rect(70px, 9999px, 30px, 0); } 100% { clip: rect(15px, 9999px, 90px, 0); } }

        /* --- UI ELEMENTS --- */
        .card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        input[type="number"], input[type="file"] { width: 100%; padding: 15px; margin: 15px 0; background: #000; border: 2px solid #333; border-radius: 10px; color: white; box-sizing: border-box; }
        input:focus { border-color: var(--neon-green); outline: none; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-top: 10px; }
        .btn-primary { background: var(--neon-green); color: black; box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4); }
        .btn-gold { background: var(--neon-gold); color: black; box-shadow: 0 5px 15px rgba(241, 196, 15, 0.4); }

        /* --- CIRCULAR PROGRESS & GLOW --- */
        .circle-box { position: relative; width: 220px; height: 220px; margin: 20px auto; }
        svg { transform: rotate(-90deg); width: 220px; height: 220px; }
        .circle-bg { fill: none; stroke: #222; stroke-width: 20; }
        .circle-progress { fill: none; stroke: var(--neon-green); stroke-width: 20; stroke-linecap: round; stroke-dasharray: 565.48; stroke-dashoffset: 565.48; transition: 1s ease-out; }
        .glow-100 .circle-progress { 
            stroke: var(--neon-gold); 
            stroke-width: 25;
            filter: drop-shadow(0 0 15px var(--neon-gold)) drop-shadow(0 0 40px var(--neon-gold)); 
        }
        .percent-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 40px; font-weight: 800; }

        /* --- IMAGE PREVIEW --- */
        .target-img-preview { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--neon-green); margin-bottom: 10px; display: none; margin: 0 auto 15px; }
    </style>
</head>
<body>

    <div id="scene0" class="scene active">
        <div class="glitch-wrapper">
            <div class="glitch-text">NabungYUK!</div>
        </div>
        <p style="margin-top: 20px; color: #888;">Nabung jadi lebih gahar...</p>
    </div>

    <div id="scene1" class="scene">
        <div class="card">
            <h2 style="color: var(--neon-green);">Set Target Lu</h2>
            <label>Nominal Target (Rp) *</label>
            <input type="number" id="targetAmount" placeholder="Contoh: 5000000">
            <label>Foto Barang Impian (Opsional)</label>
            <input type="file" id="targetFile" accept="image/*">
            <button class="btn btn-primary" onclick="startNabung()">Gass Menabung!</button>
        </div>
    </div>

    <div id="scene2" class="scene">
        <img id="viewTargetImg" class="target-img-preview">
        <h2 id="viewTargetName">Target Lu</h2>
        
        <div class="circle-box" id="circleBox">
            <svg viewBox="0 0 200 200">
                <circle class="circle-bg" cx="100" cy="100" r="90"></circle>
                <circle class="circle-progress" id="progBar" cx="100" cy="100" r="90"></circle>
            </svg>
            <div class="percent-label"><span id="txtPersen">0</span>%</div>
        </div>

        <div class="card">
            <p>Terkumpul: <b id="txtTerkumpul">Rp 0</b></p>
            <p style="font-size: 12px; color: #aaa;">Target: <span id="txtTargetTotal">Rp 0</span></p>
            <hr style="opacity: 0.1;">
            <label style="font-size: 12px;">Masukin Nominal (Rp)</label>
            <input type="number" id="addAmount" placeholder="Berapa hari ini?">
            <label style="font-size: 12px;">Bukti Nota/Duit (Opsional)</label>
            <input type="file" id="proofFile" accept="image/*">
            <button class="btn btn-gold" onclick="tambahTabungan()">Isi Celengan</button>
            <button onclick="resetSemua()" style="background:none; border:none; color:#555; margin-top:15px; cursor:pointer; font-size:10px;">Reset Progress</button>
        </div>
    </div>

    <script>
        let targetValue = localStorage.getItem('target_val') || 0;
        let currentSaved = localStorage.getItem('saved_val') || 0;
        let targetImg = localStorage.getItem('target_img') || '';

        // -- LOGIKA SCENE --
        window.onload = () => {
            setTimeout(() => {
                if (targetValue > 0) {
                    showScene('scene2');
                    renderDashboard();
                } else {
                    showScene('scene1');
                }
            }, 3000); // Glitch tampil 3 detik
        };

        function showScene(id) {
            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // -- SCENE 1: START --
        function startNabung() {
            const val = document.getElementById('targetAmount').value;
            const file = document.getElementById('targetFile').files[0];

            if (!val || val <= 0) return alert("Isi nominal targetnya dulu, Jih!");

            targetValue = val;
            localStorage.setItem('target_val', val);

            if (file) {
                const reader = new FileReader();
                reader.onloadend = () => {
                    targetImg = reader.result;
                    localStorage.setItem('target_img', targetImg);
                    completeStart();
                };
                reader.readAsDataURL(file);
            } else {
                completeStart();
            }
        }

        function completeStart() {
            showScene('scene2');
            renderDashboard();
        }

        // -- SCENE 2: DASHBOARD --
        function renderDashboard() {
            const persen = Math.min((currentSaved / targetValue) * 100, 100);
            document.getElementById('txtPersen').innerText = Math.floor(persen);
            document.getElementById('txtTerkumpul').innerText = "Rp " + Number(currentSaved).toLocaleString();
            document.getElementById('txtTargetTotal').innerText = "Rp " + Number(targetValue).toLocaleString();

            const offset = 565.48 - (persen / 100 * 565.48);
            document.getElementById('progBar').style.strokeDashoffset = offset;

            if (targetImg) {
                const img = document.getElementById('viewTargetImg');
                img.src = targetImg;
                img.style.display = 'block';
            }

            if (persen >= 100) {
                document.getElementById('circleBox').classList.add('glow-100');
            } else {
                document.getElementById('circleBox').classList.remove('glow-100');
            }
        }

        function tambahTabungan() {
            const input = document.getElementById('addAmount');
            const nominal = Number(input.value);

            if (nominal <= 0) return alert("Masukin duitnya yang bener, Jih!");

            currentSaved = Number(currentSaved) + nominal;
            localStorage.setItem('saved_val', currentSaved);
            input.value = "";
            renderDashboard();
            alert("Duit tersimpan! Semangat Boss!");
        }

        function resetSemua() {
            if (confirm("Yakin mau hapus semua? Data ilang permanen lho!")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
