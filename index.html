<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NabungYUK! - 100% Ultra Mode</title>
    <style>
        /* CSS Utama */
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
            overflow: hidden; /* Buat nahan confetti */
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 10;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h2 {
            color: #2ecc71;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.5);
        }

        /* --- Container Progress Lingkaran TEBEL --- */
        .circle-container {
            position: relative;
            width: 240px;
            height: 240px;
            margin: 25px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* SVG & Lingkaran */
        svg {
            transform: rotate(-90deg);
            width: 240px;
            height: 240px;
        }

        .circle-bg {
            fill: none;
            stroke: rgba(255,255,255,0.1);
            stroke-width: 20; /* TEBEL */
        }

        .circle-progress {
            fill: none;
            stroke: #2ecc71;
            stroke-width: 20; /* TEBEL */
            stroke-linecap: round;
            /* Keliling = 2 * PI * R (R=100) */
            stroke-dasharray: 628.3;
            stroke-dashoffset: 628.3; /* Mulai kosong */
            transition: stroke-dashoffset 1s ease-out, stroke 0.5s ease;
            filter: drop-shadow(0 0 10px rgba(46, 204, 113, 0.8));
        }

        /* Teks di tengah */
        .percentage-text {
            position: absolute;
            font-size: 48px;
            font-weight: 800;
            color: white;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .percentage-text span {
            font-size: 16px;
            font-weight: 400;
            opacity: 0.8;
            margin-top: -5px;
        }

        /* --- ANIMASI 100% MELEDAK (Class khusus) --- */
        .status-100 .circle-container {
            animation: pulseAura 2s infinite ease-in-out, rotateContainer 10s infinite linear;
        }

        .status-100 .circle-progress {
            stroke: #f1c40f; /* Warna EMAS masif */
            filter: drop-shadow(0 0 25px rgba(241, 196, 15, 1));
            stroke-width: 25; /* Makin TEBEL pas 100% */
        }

        .status-100 .percentage-text {
            color: #f1c40f;
            text-shadow: 0 0 20px rgba(241, 196, 15, 0.8);
            animation: textPop 0.5s ease-out;
        }

        /* Keyframes Animasi */
        @keyframes pulseAura {
            0% { box-shadow: 0 0 20px rgba(241, 196, 15, 0.3); }
            50% { box-shadow: 0 0 60px rgba(241, 196, 15, 0.7); }
            100% { box-shadow: 0 0 20px rgba(241, 196, 15, 0.3); }
        }

        @keyframes rotateContainer {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes textPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* --- Elemen UI Lainnya --- */
        .info-tabungan {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .info-tabungan p {
            margin: 5px 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .info-tabungan strong {
            font-size: 18px;
        }

        .input-group {
            text-align: left;
            margin-top: 15px;
        }

        label {
            font-size: 12px;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 1px;
            margin-left: 5px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            margin: 8px 0 15px 0;
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #2ecc71;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            border: none;
            color: white;
            font-weight: 700;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.3s;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
        }

        button:hover {
            box-shadow: 0 8px 25px rgba(46, 204, 113, 0.5);
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-reset {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid rgba(231, 76, 60, 0.5);
            color: #e74c3c;
            font-size: 12px;
            padding: 10px;
            margin-top: 15px;
            box-shadow: none;
        }
        .btn-reset:hover {
            background: rgba(231, 76, 60, 0.4);
            box-shadow: 0 5px 10px rgba(231, 76, 60, 0.2);
        }

        /* --- Confetti Canvas --- */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="card" id="mainCard">
    <h2>NabungYUK!</h2>
    
    <div class="circle-container" id="circleContainer">
        <svg viewBox="0 0 220 220">
            <circle class="circle-bg" cx="110" cy="110" r="100"></circle>
            <circle class="circle-progress" id="progressObject" cx="110" cy="110" r="100"></circle>
        </svg>
        <div class="percentage-text">
            <div id="persenText">0</div>
            <span>%</span>
        </div>
    </div>

    <div class="info-tabungan">
        <p>Target: <strong id="displayTarget">Rp 0</strong></p>
        <p>Terkumpul: <strong id="displayTerkumpul" style="color: #2ecc71;">Rp 0</strong></p>
    </div>

    <div class="input-group">
        <label>🎯 Set/Ubah Target (Rp)</label>
        <input type="number" id="inputTarget" placeholder="Contoh: 1000000">
        
        <label>💰 Masukin Duit (Rp)</label>
        <input type="number" id="inputNabung" placeholder="Nominal nabung">
        
        <button onclick="updateTabungan()">Gas Nabung!</button>
        <button onclick="resetData()" class="btn-reset">Reset Semua Data</button>
    </div>
</div>

<script>
    // --- LOGIKA UTAMA NabungYUK! ---
    let totalNabung = Number(localStorage.getItem('total_ultra')) || 0;
    let targetNabung = Number(localStorage.getItem('target_ultra')) || 0;
    const kelilingLingkaran = 2 * Math.PI * 100; // 628.3

    const card = document.getElementById('mainCard');
    const progressObj = document.getElementById('progressObject');
    const persenText = document.getElementById('persenText');
    const circleContainer = document.getElementById('circleContainer');

    function renderProgress() {
        document.getElementById('displayTarget').innerText = "Rp " + targetNabung.toLocaleString('id-ID');
        document.getElementById('displayTerkumpul').innerText = "Rp " + totalNabung.toLocaleString('id-ID');

        let persentase = targetNabung > 0 ? (totalNabung / targetNabung) * 100 : 0;
        let persenTampil = Math.min(persentase, 100);
        
        // Animasi Angka
        animateNumber(Number(persenText.innerText), persenTampil, persenText);

        // Update SVG Progress
        const offset = kelilingLingkaran - (persenTampil / 100 * kelilingLingkaran);
        progressObj.style.strokeDashoffset = offset;

        // --- CEK STATUS 100% ---
        if (persentase >= 100) {
            if (!card.classList.contains('status-100')) {
                // Baru tembus 100%
                card.classList.add('status-100');
                startConfetti(); // MELEDAK!
            }
        } else {
            card.classList.remove('status-100');
            stopConfetti();
        }
    }

    function updateTabungan() {
        let inTarget = document.getElementById('inputTarget').value;
        let inNabung = document.getElementById('inputNabung').value;

        if (inTarget > 0) {
            targetNabung = Number(inTarget);
            localStorage.setItem('target_ultra', targetNabung);
            document.getElementById('inputTarget').value = "";
        }

        if (targetNabung <= 0) {
            alert("Set target dulu dong, Boss!");
            return;
        }

        if (inNabung > 0) {
            totalNabung += Number(inNabung);
            localStorage.setItem('total_ultra', totalNabung);
            document.getElementById('inputNabung').value = "";
        }

        renderProgress();
    }

    function resetData() {
        if(confirm("Yakin mau hapus data? Ntar nyesel lho...")) {
            localStorage.removeItem('total_ultra');
            localStorage.removeItem('target_ultra');
            totalNabung = 0;
            targetNabung = 0;
            renderProgress();
        }
    }

    // Helper: Animasi Angka Halus
    function animateNumber(start, end, element) {
        if (start === end) return;
        let range = end - start;
        let current = start;
        let increment = end > start ? 1 : -1;
        let stepTime = Math.abs(Math.floor(1000 / range));
        if (stepTime < 10) stepTime = 10; // Batas kecepatan

        let timer = setInterval(function() {
            current += increment;
            element.innerText = Math.floor(current);
            if (current == end) {
                clearInterval(timer);
                element.innerText = end.toFixed(0); // Pastikan pas
            }
        }, stepTime);
    }

    // --- SISTEM CONFETTI EMAS TEBEL ---
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let confetti = [];
    const confettiCount = 150; // Padet
    const gravity = 0.5;
    const terminalVelocity = 5;
    const drag = 0.07;
    const colors = ['#f1c40f', '#f39c12', '#e67e22', '#fff']; // Skema Emas

    let confettiActive = false;

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height - canvas.height; // Mulai dari atas screen
            this.size = Math.random() * 8 + 4; // Tebel
            this.velocity = { x: Math.random() * 6 - 3, y: Math.random() * 10 + 5 };
            this.rotation = Math.random() * 360;
            this.rotationSpeed = Math.random() * 10 - 5;
            this.color = colors[Math.floor(Math.random() * colors.length)];
        }

        update() {
            this.velocity.y += gravity;
            this.velocity.y = Math.min(this.velocity.y, terminalVelocity);
            this.velocity.x -= this.velocity.x * drag;
            this.x += this.velocity.x;
            this.y += this.velocity.y;
            this.rotation += this.rotationSpeed;

            // Loop back to top
            if (this.y > canvas.height) {
                this.y = -this.size;
                this.velocity.y = Math.random() * 10 + 5;
            }
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation * Math.PI / 180);
            ctx.fillStyle = this.color;
            ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size); // Kotak foil
            ctx.restore();
        }
    }

    function startConfetti() {
        if (confettiActive) return;
        confettiActive = true;
        confetti = [];
        for (let i = 0; i < confettiCount; i++) {
            confetti.push(new Particle());
        }
        animateConfetti();
    }

    function stopConfetti() {
        confettiActive = false;
        ctx.clearRect(0, 0, canvas.width, canvas.height); // Bersihin canvas
    }

    function animateConfetti() {
        if (!confettiActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        confetti.forEach(p => {
            p.update();
            p.draw();
        });
        
        requestAnimationFrame(animateConfetti);
    }

    // Resize canvas
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    // Jalankan render pertama kali
    renderProgress();

</script>

</body>
</html>
